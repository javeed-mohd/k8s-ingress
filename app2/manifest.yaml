apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  # These labels are replicaset labels reference
  labels:
    project: roboshop
    tier: frontend
    component: app2
spec:
  replicas: 2
  selector:
  # Using these labels, replicaset selects the pod.
    matchLabels:
      project: roboshop
      tier: frontend
      component: app2
  # This is Pod definition, Pod is subset of replicaset
  template:
    metadata:
      # These MUST match the 'selector' labels specified above
      labels:
        project: roboshop
        tier: frontend
        component: app2
    spec:
      containers:
      - name: app2
        image: javeedmohd214/app2:1.0.0
---
# A service is a method for exposing a network application that is running on one or more Pods in your cluster.
apiVersion: v1
kind: Service
metadata:
  name: app2
spec:
  selector:
    # Labels are used as selectors.
    project: roboshop
    tier: frontend
    component: app2
  ports:
  - protocol: TCP
    port: 80          # Service Port
    targetPort: 80    # Container Port    
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app2
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: 'arn:aws:acm:us-east-1:996669628469:certificate/4ea52a1d-6008-4a84-9e12-ecc50c2de4a9'
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/tags: Environment=dev,Project=roboshop
    alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/group.name: roboshop
spec:
  ingressClassName: alb
  rules:
  - host: "app2.devopsdaws.online"
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: app2
            port:
              number: 80